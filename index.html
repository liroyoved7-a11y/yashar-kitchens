<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ישר מטבחים - עיצוב והתקנה</title>
    <style>
        :root {
            --primary: #e5a93b;
            --primary-hover: #c68f2e;
            --dark-blue: #243547;
            --dark: #1a202c;
            --light: #f8fafc;
            --border: #e2e8f0;
            --success: #2f855a;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: var(--light); color: var(--dark); }

        /* כפתור צף */
        .floating-order-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background-color: var(--primary); color: white; padding: 10px 15px;
            border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; border: none; font-size: 14px;
        }

        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('kitchen1.jpeg') no-repeat center center/cover; color: white; padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 48px; color: var(--primary); margin: 0; }
        
        .main-content { max-width: 1200px; margin: 50px auto; padding: 0 20px; text-align: center; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        /* התאמה לנייד - 2 תמונות בשורה */
        @media (max-width: 600px) {
            .products-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; }
            .product-description { display: none; }
            .product-title { font-size: 14px !important; }
            .image-wrapper { height: 100px !important; }
        }

        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid var(--border); display: flex; flex-direction: column; }
        .image-wrapper { width: 100%; height: 200px; overflow: hidden; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-details { padding: 15px; text-align: right; }
        .product-title { font-size: 18px; font-weight: 700; margin: 0 0 5px 0; }
        .buy-button { background-color: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        .form-container { display: none; max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .submit-button { background-color: var(--dark-blue); color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="floating-order-btn" onclick="scrollToForm()">להזמנה</button>

    <div class="hero">
        <h1>ישר מטבחים</h1>
    </div>

    <main class="main-content">
        <div class="products-grid">
            <!-- קיים -->
            <div class="product-card"><div class="image-wrapper"><img src="kitchen1.jpeg" alt="מטבח"></div><div class="product-details"><h3 class="product-title">צבע לתנור</h3><button class="buy-button" onclick="selectKitchen('צבע לתנור')">בחר</button></div></div>
            <div class="product-card"><div class="image-wrapper"><img src="kitchen2.jpeg" alt="מטבח"></div><div class="product-details"><h3 class="product-title">צבע אקריל</h3><button class="buy-button" onclick="selectKitchen('צבע אקריל')">בחר</button></div></div>
            <div class="product-card"><div class="image-wrapper"><img src="kitchen3.jpeg" alt="מטבח"></div><div class="product-details"><h3 class="product-title">פורמייקה</h3><button class="buy-button" onclick="selectKitchen('פורמייקה')">בחר</button></div></div>
            
            <!-- חדש -->
            <div class="product-card"><div class="image-wrapper"><img src="kitchen4.jpeg" alt="חדר רחצה"></div><div class="product-details"><h3 class="product-title">שירותים וחדר רחצה</h3><button class="buy-button" onclick="selectKitchen('שירותים וחדר רחצה')">בחר</button></div></div>
            <div class="product-card"><div class="image-wrapper"><img src="kitchen5.jpeg" alt="ארון"></div><div class="product-details"><h3 class="product-title">ארון בגדים</h3><button class="buy-button" onclick="selectKitchen('ארון בגדים')">בחר</button></div></div>
        </div>

        <div class="form-container" id="lead-form">
            <h2>בקשת הצעת מחיר</h2>
            <form onsubmit="validateAndSend(event)">
                <div class="form-group">
                    <label>סוג מוצר:</label>
                    <select id="kitchen-style">
                        <option value="צבע לתנור">צבע לתנור</option>
                        <option value="צבע אקריל">צבע אקריל</option>
                        <option value="פורמייקה">פורמייקה</option>
                        <option value="שירותים וחדר רחצה">שירותים וחדר רחצה</option>
                        <option value="ארון בגדים">ארון בגדים</option>
                    </select>
                </div>
                <div class="form-group"><label>שם מלא:</label><input type="text" id="fullname" required></div>
                <button type="submit" class="submit-button">שלח לוואטסאפ</button>
            </form>
        </div>
    </main>

    <script>
        function scrollToForm() {
            const form = document.getElementById('lead-form');
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth' });
        }
        function selectKitchen(style) {
            scrollToForm();
            document.getElementById('kitchen-style').value = style;
        }
        function validateAndSend(event) {
            event.preventDefault();
            const style = document.getElementById('kitchen-style').value;
            const name = document.getElementById('fullname').value;
            window.open(`https://wa.me/972584988888?text=${encodeURIComponent('היי דוד, אני מעוניין ב-'+style+'. שמי: '+name)}`, '_blank');
        }
    </script>
</body>
</html>
