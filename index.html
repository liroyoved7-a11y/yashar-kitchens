<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ישר מטבחים</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        
        /* כפתור צף */
        .floating-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: #333; color: white; padding: 10px 20px;
            border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* גריד גמיש - מסתדר עם 5 תמונות */
        .products-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            margin: 40px auto;
        }

        .card {
            background: white;
            width: 45%; /* גודל כרטיס למובייל (קצת פחות מ-50% כדי שייכנסו 2 בשורה) */
            max-width: 200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #eee;
        }

        .card h3 { padding: 10px 5px; margin: 0; font-size: 14px; }
        .card button { width: 90%; margin-bottom: 10px; padding: 8px; background: #d4a373; border: none; color: white; border-radius: 5px; cursor: pointer; }

        .form-section { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="floating-btn" onclick="document.getElementById('form').scrollIntoView({behavior:'smooth'})">להזמנה</div>

    <h1>ישר מטבחים</h1>

    <div class="products-grid">
        <!-- השמות מעודכנים בדיוק כמו ב-GitHub שלך -->
        <div class="card"><img src="kitchen1.jpeg.jpeg" alt="מטבח"><h3>צבע לתנור</h3><button onclick="selectStyle('צבע לתנור')">בחר</button></div>
        <div class="card"><img src="kitchen2.jpeg.jpeg" alt="מטבח"><h3>צבע אקריל</h3><button onclick="selectStyle('צבע אקריל')">בחר</button></div>
        <div class="card"><img src="kitchen3.jpeg.jpeg" alt="מטבח"><h3>פורמייקה</h3><button onclick="selectStyle('פורמייקה')">בחר</button></div>
        <div class="card"><img src="kitchen4.jpeg.jpeg" alt="חדר רחצה"><h3>חדר רחצה</h3><button onclick="selectStyle('חדר רחצה')">בחר</button></div>
        <div class="card"><img src="kitchen5.jpeg.jpeg" alt="ארון"><h3>ארון בגדים</h3><button onclick="selectStyle('ארון בגדים')">בחר</button></div>
    </div>

    <div class="form-section" id="form">
        <h2>הזמנה</h2>
        <select id="style" style="width:100%; padding:10px;">
            <option>צבע לתנור</option>
            <option>צבע אקריל</option>
            <option>פורמייקה</option>
            <option>חדר רחצה</option>
            <option>ארון בגדים</option>
        </select>
        <br><br>
        <input type="text" id="name" placeholder="שם מלא" style="width:95%; padding:10px;">
        <br><br>
        <button onclick="send()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:5px;">שלח לוואטסאפ</button>
    </div>

    <script>
        function selectStyle(s) {
            document.getElementById('style').value = s;
            document.getElementById('form').scrollIntoView({behavior:'smooth'});
        }
        function send() {
            const s = document.getElementById('style').value;
            const n = document.getElementById('name').value;
            window.open(`https://wa.me/972584988888?text=היי דוד, אני מעוניין ב-${s}. שמי: ${n}`, '_blank');
        }
    </script>
</body>
</html>
